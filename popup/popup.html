<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="../icon.png" class="logo" alt="Logo">
      <div class="title-container">
        <span class="app-title">Jayden Translator</span>
        <span id="header-status" class="status-indicator">Inactive</span>
      </div>
    </div>
    <label class="switch">
      <input type="checkbox" id="main-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="section" id="active-translation-section" style="display: none;">
    <span class="section-label">Active Translation</span>
    <div class="control-row">
      <button class="stop-btn" id="stop-btn">
        <div class="square-icon"></div>
        STOP
      </button>
      <span class="translating-status">Status: Translating...</span>
    </div>
  </div>

  <div class="section">
    <span class="section-label">Language Settings</span>
    <div class="lang-badge">
      <span id="current-lang-text">VIETNAMESE</span>
    </div>
    <select id="lang-select">
      <option value="vi">Vietnamese</option>
      <option value="en">English</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="zh">Chinese</option>
      <option value="fr">French</option>
    </select>
  </div>

  <div class="section">
    <span class="section-label">Configuration</span>
    <div class="api-input-container">
      <div style="font-size: 11px; color: #8c8d91; margin-bottom: 4px;">API Provider:</div>
      <select id="provider-select" style="margin-bottom: 8px;">
        <option value="openai">OpenAI</option>
        <option value="openrouter">OpenRouter</option>
        <option value="deepseek">DeepSeek</option>
      </select>
      <div style="font-size: 11px; color: #8c8d91; margin-bottom: 4px;">API Key:</div>
      <input type="password" id="api-key-input" placeholder="••••••••••••••••">
    </div>
  </div>

  <div class="footer">
    <div id="gear-link" style="cursor: pointer; display: flex; align-items: center; gap: 6px; width: 100%; justify-content: flex-end;">
      <span class="gear-icon">⚙️</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
