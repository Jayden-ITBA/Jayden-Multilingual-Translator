<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
    }
    h2 { font-size: 16px; margin-top: 0; color: #333; }
    .status { margin-bottom: 15px; font-size: 13px; color: #666; }
    .btn {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    .btn-start { background: #28a745; color: white; }
    .btn-start:hover { background: #218838; }
    .btn-stop { background: #dc3545; color: white; }
    .btn-stop:hover { background: #c82333; }
    select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    label { font-size: 12px; font-weight: bold; color: #555; }
  </style>
</head>
<body>
  <h2>Jayden Translator</h2>
  <div class="status">Status: <span id="status-text">Ready</span></div>
  
  <button id="start-btn" class="btn btn-start">Start Subtitles</button>
  <button id="stop-btn" class="btn btn-stop" style="display:none;">Stop</button>

  <div style="margin-top: 15px;">
    <label for="lang-select">Target Language:</label>
    <select id="lang-select">
      <option value="vi">Vietnamese</option>
      <option value="en">English</option>
      <option value="fr">French</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
    </select>
  </div>

  <div style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px;">
    <label for="provider-select">AI Provider:</label>
    <select id="provider-select" style="margin-bottom:8px;">
      <option value="openai">OpenAI (Default)</option>
      <option value="openrouter">OpenRouter</option>
      <option value="deepseek">DeepSeek</option>
      <option value="gemini">Google Gemini</option>
    </select>
    
    <label for="api-key-input">API Key:</label>
    <input type="password" id="api-key-input" placeholder="Paste your key here" style="width: 100%; padding: 8px; box-sizing: border-box; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc;">
    <small style="font-size: 10px; color: #888;">Keys are stored locally in your browser.</small>
  </div>

  <script src="popup.js"></script>
</body>
</html>
